server:
  port: 8080

spring:
  application:
    name: moonseo-bookstore
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    url: jdbc:mysql://127.0.0.1:3307/ms?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ms
    password: ms_pw
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

logging:
  level:
    root: INFO
    org.springframework.security: TRACE
    org.flywaydb.core: INFO
    org.hibernate.SQL: INFO