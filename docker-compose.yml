services:
  mysql:
    image: mysql:8.4
    container_name: ms-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ms
      MYSQL_USER: ms
      MYSQL_PASSWORD: ms_pw
      MYSQL_ROOT_PASSWORD: root_pw
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - ms_mysql_data:/var/lib/mysql

volumes:
  ms_mysql_data:
